<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация - Control System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            padding: 40px;
            width: 100%;
            max-width: 450px;
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo h1 {
            color: #333;
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .logo p {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }

        input, select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e1e5e9;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s ease;
            background: #f8f9fa;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn:active {
            transform: translateY(0);
        }

        .login-link {
            text-align: center;
            margin-top: 25px;
            color: #666;
            font-size: 14px;
        }

        .login-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        .error {
            background: #fee;
            border: 1px solid #fcc;
            color: #c33;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .success {
            background: #efe;
            border: 1px solid #cfc;
            color: #363;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .job-title-options {
            display: flex;
            flex-direction: column;
            gap: 5px;
            margin-top: 5px;
        }

        .job-option {
            padding: 8px 12px;
            border: 1px solid #e1e5e9;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .job-option:hover {
            background: #f0f4ff;
            border-color: #667eea;
        }

        .job-option.selected {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>Control System</h1>
            <p>Система управления строительными проектами</p>
        </div>

        <div id="errorMessage" class="error"></div>
        <div id="successMessage" class="success"></div>

        <form id="registrationForm">
            <div class="form-group">
                <label for="name">ФИО *</label>
                <input type="text" id="name" name="name" required placeholder="Введите ваше полное имя">
            </div>

            <div class="form-group">
                <label for="email">Email *</label>
                <input type="email" id="email" name="email" required placeholder="example@company.com">
            </div>

            <div class="form-group">
                <label for="age">Возраст *</label>
                <input type="number" id="age" name="age" required min="18" max="100" placeholder="25">
            </div>

            <div class="form-group">
                <label for="password">Пароль *</label>
                <input type="password" id="password" name="password" required placeholder="Не менее 6 символов">
            </div>

            <div class="form-group">
                <label>Должность *</label>
                <select id="job_title" name="job_title" required>
                    <option value="">Выберите должность</option>
                    <option value="engineer">Инженер</option>
                    <option value="manager">Менеджер</option>
                    <option value="seo">Руководитель</option>
                </select>
                
                <div class="job-title-options">
                    <div class="job-option" data-value="engineer">
                        🛠️ Инженер - регистрация дефектов, обновление информации
                    </div>
                    <div class="job-option" data-value="manager">
                        📊 Менеджер - назначение задач, контроль сроков, отчёты
                    </div>
                    <div class="job-option" data-value="seo">
                        👨‍💼 Руководитель - просмотр прогресса и аналитика
                    </div>
                </div>
            </div>

            <button type="submit" class="btn">Зарегистрироваться</button>
        </form>

        <div class="login-link">
            Уже есть аккаунт? <a href="/login">Войдите в систему</a>
        </div>
    </div>

    <script>
        // Обработка выбора должности
        document.querySelectorAll('.job-option').forEach(option => {
            option.addEventListener('click', function() {
                document.querySelectorAll('.job-option').forEach(opt => {
                    opt.classList.remove('selected');
                });
                this.classList.add('selected');
                document.getElementById('job_title').value = this.dataset.value;
            });
        });

        // Обработка формы
        document.getElementById('registrationForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const formData = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                age: parseInt(document.getElementById('age').value),
                password: document.getElementById('password').value,
                job_title: document.getElementById('job_title').value
            };

            // Валидация
            if (!formData.job_title) {
                showError('Пожалуйста, выберите должность');
                return;
            }

            if (formData.password.length < 6) {
                showError('Пароль должен содержать не менее 6 символов');
                return;
            }

            try {
                const response = await fetch('/register/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(formData)
                });

                const data = await response.json();

                if (response.ok) {
                    showSuccess('Регистрация успешна! Проверьте вашу почту для подтверждения.');
                    document.getElementById('registrationForm').reset();
                    document.querySelectorAll('.job-option').forEach(opt => {
                        opt.classList.remove('selected');
                    });
                    
                    // Перенаправление на страницу входа через 3 секунды
                    setTimeout(() => {
                        window.location.href = '/login';
                    }, 3000);
                } else {
                    showError(data.detail || 'Ошибка при регистрации');
                }
            } catch (error) {
                showError('Ошибка соединения с сервером');
            }
        });

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            document.getElementById('successMessage').style.display = 'none';
        }

        function showSuccess(message) {
            const successDiv = document.getElementById('successMessage');
            successDiv.textContent = message;
            successDiv.style.display = 'block';
            document.getElementById('errorMessage').style.display = 'none';
        }
    </script>
</body>
</html>
