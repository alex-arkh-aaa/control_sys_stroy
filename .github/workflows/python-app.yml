# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Simple Tests

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.12
      uses: actions/setup-python@v3
      with:
        python-version: "3.12"
    
    - name: Install ALL dependencies globally
      run: |
        python -m pip install --upgrade pip
        # Ставим ВСЕ нужные библиотеки ГЛОБАЛЬНО одной командой
        pip install fastapi uvicorn sqlalchemy asyncpg redis aio-pika pytest pytest-asyncio httpx
            
    # - name: Run auth-service tests
    #   run: |
    #     cd services/auth-service
    #     python -m pytest tests/ -v
    
    
    # - name: Run core-service tests  
    #   run: |
    #     cd services/core-service
    #     python -m pytest tests/ -v
    
    - name: Run notify-service tests
      run: |
        cd services/notify-service
        python -m pytest tests/test.py -v
